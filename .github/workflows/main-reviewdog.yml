name: <Main> Reviewdog

permissions:
  contents: read
  pull-requests: write

on: [pull_request]

jobs:
  eslint:
    name: runner / eslint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: layers/main
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - run: bun install
      - uses: reviewdog/action-eslint@v1
        with:
          reporter: github-pr-review
          workdir: layers/main/
          eslint_flags: 'app/'
