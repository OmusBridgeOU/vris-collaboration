name: ❓ 質問 / Q&A
description: 開発に関する質問や相談はこちら
title: "[Question] "
labels:
  - question

body:
  - type: textarea
    id: question
    attributes:
      label: ❓ 質問内容
      description: 質問内容をできるだけ明確に記述してください。
      placeholder: 例）Next.js の Server Actions 内で外部APIを呼ぶ場合の注意点は？
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: ✅ 試したこと
      description: すでに試した方法があれば記述してください。
      placeholder: |
        ・公式ドキュメントを確認
        ・fetch 実装を試した
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 📝 補足情報
      description: 環境・コードの抜粋など、回答に必要そうな情報があれば記載してください。
